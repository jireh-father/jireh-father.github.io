        // CombatSystem 클래스
        class CombatSystem {
            constructor(scene) {
                this.scene = scene;
                this.criticalChance = 0.15; // 15% 크리티컬 확률
                this.criticalMultiplier = 1.5; // 1.5배 크리티컬 데미지
            }
            
            calculateDamage(attacker, defender, type = 'basic', baseDamage = null) {
                let damage = baseDamage || attacker.stats.attack;
                
                // 레벨에 따른 데미지 보정
                const levelBonus = attacker.stats.level * 2;
                damage += levelBonus;
                
                // 방어력에 따른 데미지 감소
                const defense = defender.stats.defense || 0;
                const damageReduction = defense / (defense + 100);
                damage = damage * (1 - damageReduction);
                
                // 크리티컬 확률 계산
                const isCritical = Math.random() < this.criticalChance;
                if (isCritical) {
                    damage *= this.criticalMultiplier;
                }
                
                return {
                    damage: Math.max(1, Math.floor(damage)),
                    isCritical: isCritical
                };
            }
            
            applyDamage(target, damage) {
                if (target.isDead) return false;
                
                // 데미지 적용 (음수면 치유)
                target.stats.currentHp -= damage;
                
                // 체력 범위 제한
                if (target.stats.currentHp > target.stats.maxHp) {
                    target.stats.currentHp = target.stats.maxHp;
                }
                
                // 사망 처리
                if (target.stats.currentHp <= 0) {
                    target.stats.currentHp = 0;
                    this.handleDeath(target);
                    return true; // 사망
                }
                
                return false; // 생존
            }
            
            handleDeath(target) {
                target.isDead = true;
                
                // 사망 이펙트
                this.createCombatEffect(target.x || target.sprite?.x || 0, target.y || target.sprite?.y || 0, 'death');
                
                // 시각적 효과
                if (target.sprite) {
                    target.sprite.setTint(0x666666);
                    target.sprite.setAlpha(0.5);
                }
                
                // UI 숨기기
                if (target.healthBar) target.healthBar.setVisible(false);
                if (target.manaBar) target.manaBar.setVisible(false);
                if (target.nameText) target.nameText.setVisible(false);
                if (target.levelText) target.levelText.setVisible(false);
            }
            
            performBasicAttack(attacker, target) {
                const damageResult = this.calculateDamage(attacker, target, 'basic');
                
                // 공격 애니메이션
                if (attacker.sprite) {
                    // 스프라이트 타입에 따라 다른 메서드 사용
                    if (typeof attacker.sprite.setTint === 'function') {
                        // Sprite 객체인 경우
                        attacker.sprite.setTint(0xffff00);
                    } else if (typeof attacker.sprite.setFillStyle === 'function') {
                        // Rectangle 객체인 경우
                        attacker.sprite.setFillStyle(0xffff00);
                    }
                    
                    this.scene.tweens.add({
                        targets: attacker.sprite,
                        scaleX: 1.2,
                        scaleY: 1.2,
                        duration: 100,
                        yoyo: true,
                        onComplete: () => {
                            if (typeof attacker.sprite.setTint === 'function') {
                                attacker.sprite.setTint(0xffffff);
                            } else if (typeof attacker.sprite.setFillStyle === 'function') {
                                // 원래 색상으로 복원 (넥서스 타워의 경우)
                                const originalColor = attacker.team === 'player' ? 0x0066cc : 0xcc0000;
                                attacker.sprite.setFillStyle(originalColor);
                            }
                        }
                    });
                }
                
                // 데미지 적용
                const isDead = this.applyDamage(target, damageResult.damage);
                
                // 이펙트 생성
                const effectType = damageResult.isCritical ? 'critical' : 'hit';
                this.createCombatEffect(target.x || target.sprite?.x || 0, target.y || target.sprite?.y || 0, effectType);
                
                return { damage: damageResult.damage, isCritical: damageResult.isCritical, isDead };
            }
            
            createCombatEffect(x, y, type) {
                let color, size, duration;
                
                switch (type) {
                    case 'hit':
                        color = 0xff0000;
                        size = 16;
                        duration = 300;
                        break;
                    case 'critical':
                        color = 0xffff00;
                        size = 24;
                        duration = 500;
                        break;
                    case 'death':
                        color = 0x800080;
                        size = 32;
                        duration = 800;
                        break;
                    default:
                        color = 0xffffff;
                        size = 12;
                        duration = 200;
                }
                
                // 전투 효과음 재생
                if (this.scene.soundManager) {
                    this.scene.soundManager.playCombatSound(type);
                }
                
                // 이펙트 스프라이트 생성 (간단한 원형으로 대체)
                const effect = this.scene.add.circle(x, y, size/2, color);
                effect.setAlpha(0.8);
                
                // 이펙트 애니메이션
                this.scene.tweens.add({
                    targets: effect,
                    scaleX: 2,
                    scaleY: 2,
                    alpha: 0,
                    duration: duration,
                    ease: 'Power2',
                    onComplete: () => {
                        effect.destroy();
                    }
                });
                
                return effect;
            }
        }

        // KillDeathManager 클래스
        class KillDeathManager {
            constructor() {
                this.stats = new Map();
                this.reset();
            }
            
            recordKill(killer, victim, assists = []) {
                // 킬러 킬 증가
                const killerStats = this.getStats(killer);
                killerStats.kills++;
                this.stats.set(killer, killerStats);
                
                // 어시스트 기록
                assists.forEach(assistant => {
                    const assistStats = this.getStats(assistant);
                    assistStats.assists++;
                    this.stats.set(assistant, assistStats);
                });
            }
            
            recordDeath(victim, killer) {
                const victimStats = this.getStats(victim);
                victimStats.deaths++;
                this.stats.set(victim, victimStats);
            }
            
            getStats(playerId) {
                if (!this.stats.has(playerId)) {
                    this.stats.set(playerId, {
                        kills: 0,
                        deaths: 0,
                        assists: 0
                    });
                }
                return { ...this.stats.get(playerId) };
            }
            
            getKDA(playerId) {
                const stats = this.getStats(playerId);
                const deaths = Math.max(1, stats.deaths); // 0으로 나누기 방지
                return (stats.kills + stats.assists) / deaths;
            }
            
            reset() {
                this.stats.clear();
            }
        }

        // SoundManager 클래스
        class SoundManager {
            constructor() {
                this.sounds = {};
                this.volumes = {
                    master: 0.7,
                    music: 0.5,
                    effects: 0.8
                };
                this.muted = false;
                this.currentBackgroundMusic = null;
                this.initialized = false;
            }
            
            init() {
                if (this.initialized) return;
                
                // 음성 파일 대신 프로그래밍적으로 생성된 사운드 사용
                this.createSounds();
                this.initialized = true;
                
                console.log('SoundManager 초기화 완료');
            }
            
            createSounds() {
                // 배경음악 (웹 오디오 API로 생성)
                this.sounds.backgroundMusic = this.createTone(220, 'sine', 4.0, true); // A3 음, 4초 루프
                
                // 스킬 효과음들
                this.sounds.skill_fire = this.createTone(440, 'sawtooth', 0.3); // 불 스킬
                this.sounds.skill_ice = this.createTone(330, 'sine', 0.5); // 얼음 스킬
                this.sounds.skill_lightning = this.createTone(880, 'square', 0.2); // 번개 스킬
                
                // 전투 효과음들
                this.sounds.attack_hit = this.createTone(200, 'triangle', 0.1); // 일반 공격
                this.sounds.attack_critical = this.createTone(600, 'sawtooth', 0.2); // 크리티컬 공격
                this.sounds.death = this.createTone(150, 'sine', 1.0); // 사망
                
                // 환경 사운드
                this.sounds.victory = this.createTone(523, 'sine', 2.0); // 승리 (C5)
                this.sounds.defeat = this.createTone(147, 'sine', 2.0); // 패배 (D3)
                
                console.log('사운드 파일 생성 완료');
            }
            
            createTone(frequency, waveType = 'sine', duration = 1.0, loop = false) {
                // 웹 오디오 API를 사용하여 톤 생성
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                const createSound = () => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.type = waveType;
                    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    return { oscillator, gainNode, audioContext };
                };
                
                return {
                    play: () => {
                        try {
                            const sound = createSound();
                            sound.oscillator.start(sound.audioContext.currentTime);
                            sound.oscillator.stop(sound.audioContext.currentTime + duration);
                        } catch (error) {
                            console.warn('사운드 재생 실패:', error);
                        }
                    },
                    loop: loop,
                    duration: duration
                };
            }
            
            playSound(soundName, volume = 1.0) {
                if (this.muted || !this.sounds[soundName]) return;
                
                const effectiveVolume = this.volumes.master * this.volumes.effects * volume;
                if (effectiveVolume <= 0) return;
                
                try {
                    this.sounds[soundName].play();
                    console.log(`효과음 재생: ${soundName}`);
                } catch (error) {
                    console.warn(`효과음 재생 실패 (${soundName}):`, error);
                }
            }
            
            playBackgroundMusic() {
                if (this.muted || !this.sounds.backgroundMusic) return;
                
                try {
                    this.currentBackgroundMusic = this.sounds.backgroundMusic;
                    this.sounds.backgroundMusic.play();
                    
                    // 루프 재생을 위한 타이머 설정
                    if (this.sounds.backgroundMusic.loop) {
                        this.backgroundMusicTimer = setInterval(() => {
                            if (!this.muted && this.currentBackgroundMusic) {
                                this.sounds.backgroundMusic.play();
                            }
                        }, this.sounds.backgroundMusic.duration * 1000);
                    }
                    
                    console.log('배경음악 재생 시작');
                } catch (error) {
                    console.warn('배경음악 재생 실패:', error);
                }
            }
            
            stopBackgroundMusic() {
                if (this.backgroundMusicTimer) {
                    clearInterval(this.backgroundMusicTimer);
                    this.backgroundMusicTimer = null;
                }
                
                this.currentBackgroundMusic = null;
                console.log('배경음악 정지');
            }
            
            setVolume(type, value) {
                if (value < 0) value = 0;
                if (value > 1) value = 1;
                
                switch (type) {
                    case 'master':
                        this.volumes.master = value;
                        break;
                    case 'music':
                        this.volumes.music = value;
                        break;
                    case 'effects':
                        this.volumes.effects = value;
                        break;
                }
                
                console.log(`볼륨 설정: ${type} = ${value}`);
            }
            
            getMasterVolume() {
                return this.volumes.master;
            }
            
            getMusicVolume() {
                return this.volumes.music;
            }
            
            getEffectsVolume() {
                return this.volumes.effects;
            }
            
            mute(isMuted) {
                this.muted = isMuted;
                
                if (isMuted) {
                    this.stopBackgroundMusic();
                } else if (this.currentBackgroundMusic) {
                    this.playBackgroundMusic();
                }
                
                console.log(`음소거: ${isMuted ? '켜짐' : '꺼짐'}`);
            }
            
            isMuted() {
                return this.muted;
            }
            
            // 스킬별 효과음 재생
            playSkillSound(skillKey, championId) {
                const skillSounds = {
                    'Q': 'skill_fire',
                    'W': 'skill_ice',
                    'E': 'skill_lightning'
                };
                
                const soundName = skillSounds[skillKey] || 'skill_fire';
                this.playSound(soundName);
            }
            
            // 전투 효과음 재생
            playCombatSound(type) {
                const combatSounds = {
                    'hit': 'attack_hit',
                    'critical': 'attack_critical',
                    'death': 'death'
                };
                
                const soundName = combatSounds[type] || 'attack_hit';
                this.playSound(soundName);
            }
            
            // 게임 결과 사운드 재생
            playGameResultSound(result) {
                const resultSounds = {
                    '승리': 'victory',
                    '패배': 'defeat'
                };
                
                const soundName = resultSounds[result] || 'victory';
                this.playSound(soundName, 0.8);
            }
            
            // 리소스 정리
            cleanup() {
                this.stopBackgroundMusic();
                this.sounds = {};
                this.initialized = false;
                console.log('SoundManager 정리 완료');
            }
        }

        // NexusTower 클래스
        class NexusTower {
            constructor(x, y, team, scene = null) {
                this.x = x;
                this.y = y;
                this.team = team;
                this.scene = scene;
                
                // 넥서스 스탯
                this.maxHp = 3000;
                this.currentHp = this.maxHp;
                this.attackDamage = 200;
                this.attackRange = 300;
                this.attackSpeed = 2000; // 2초 쿨다운
                this.destroyed = false;
                
                // 공격 관련
                this.lastAttackTime = 0;
                
                // 스프라이트 생성
                if (this.scene) {
                    this.createSprite();
                }
            }
            
            createSprite() {
                // 넥서스 스프라이트 생성 (큰 사각형)
                this.sprite = this.scene.add.rectangle(this.x, this.y, 80, 80, this.team === 'player' ? 0x0066cc : 0xcc0000);
                this.sprite.setStrokeStyle(4, 0xffffff);
                
                // 체력바 생성
                this.healthBarBg = this.scene.add.rectangle(this.x, this.y - 50, 100, 8, 0x000000);
                this.healthBar = this.scene.add.rectangle(this.x, this.y - 50, 98, 6, 0x00ff00);
                
                // 팀 텍스트
                this.nameText = this.scene.add.text(this.x, this.y + 50, `${this.team.toUpperCase()} NEXUS`, {
                    fontSize: '12px',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5);
                
                this.updateHealthBar();
            }
            
            updateHealthBar() {
                if (!this.healthBar) return;
                
                const healthPercent = this.currentHp / this.maxHp;
                this.healthBar.displayWidth = 98 * healthPercent;
                this.healthBar.x = this.x - 49 + (49 * healthPercent);
                
                // 체력에 따른 색상 변경
                if (healthPercent > 0.6) {
                    this.healthBar.setFillStyle(0x00ff00);
                } else if (healthPercent > 0.3) {
                    this.healthBar.setFillStyle(0xffff00);
                } else {
                    this.healthBar.setFillStyle(0xff0000);
                }
            }
            
            takeDamage(damage) {
                if (this.destroyed) return;
                
                this.currentHp -= damage;
                if (this.currentHp <= 0) {
                    this.currentHp = 0;
                    this.destroy();
                }
                
                this.updateHealthBar();
                
                // 데미지 이펙트
                if (this.scene) {
                    const effect = this.scene.add.circle(this.x, this.y, 10, 0xff0000);
                    effect.setAlpha(0.8);
                    
                    this.scene.tweens.add({
                        targets: effect,
                        y: this.y - 30,
                        alpha: 0,
                        duration: 800,
                        onComplete: () => effect.destroy()
                    });
                }
            }
            
            destroy() {
                this.destroyed = true;
                
                if (this.sprite) {
                    this.sprite.setFillStyle(0x666666);
                    this.sprite.setAlpha(0.5);
                }
                
                if (this.nameText) {
                    this.nameText.setText(`${this.team.toUpperCase()} NEXUS (DESTROYED)`);
                    this.nameText.setTint(0xff0000);
                }
                
                // 파괴 이펙트
                if (this.scene) {
                    const explosionEffect = this.scene.add.sprite(this.x, this.y, null);
                    explosionEffect.setDisplaySize(120, 120);
                    explosionEffect.setTint(0xff4444);
                    
                    this.scene.tweens.add({
                        targets: explosionEffect,
                        scaleX: 3,
                        scaleY: 3,
                        alpha: 0,
                        duration: 1000,
                        onComplete: () => explosionEffect.destroy()
                    });
                }
            }
            
            isDestroyed() {
                return this.destroyed;
            }
            
            getHealthPercentage() {
                return (this.currentHp / this.maxHp) * 100;
            }
            
            canAttack() {
                if (this.destroyed) return false;
                
                const currentTime = Date.now();
                return currentTime - this.lastAttackTime >= this.attackSpeed;
            }
            
            findNearestEnemy(enemies) {
                if (this.destroyed || !enemies || enemies.length === 0) return null;
                
                let nearestEnemy = null;
                let nearestDistance = this.attackRange;
                
                enemies.forEach(enemy => {
                    if (enemy.isDead || enemy.team === this.team) return;
                    
                    const distance = Phaser.Math.Distance.Between(
                        this.x, this.y,
                        enemy.x || enemy.sprite?.x || 0,
                        enemy.y || enemy.sprite?.y || 0
                    );
                    
                    if (distance <= nearestDistance) {
                        nearestDistance = distance;
                        nearestEnemy = enemy;
                    }
                });
                
                return nearestEnemy;
            }
            
            attack(target) {
                if (!this.canAttack() || this.destroyed || !target) return false;
                
                this.lastAttackTime = Date.now();
                
                // 공격 애니메이션
                if (this.sprite) {
                    this.sprite.setFillStyle(0xffff00);
                    
                    if (this.scene) {
                        this.scene.tweens.add({
                            targets: this.sprite,
                            scaleX: 1.2,
                            scaleY: 1.2,
                            duration: 200,
                            yoyo: true,
                            onComplete: () => {
                                this.sprite.setFillStyle(this.team === 'player' ? 0x0066cc : 0xcc0000);
                            }
                        });
                    }
                }
                
                // 데미지 적용
                if (this.scene && this.scene.combatSystem) {
                    const attacker = {
                        stats: {
                            attack: this.attackDamage,
                            level: 10
                        },
                        sprite: this.sprite
                    };
                    
                    this.scene.combatSystem.performBasicAttack(attacker, target);
                } else {
                    // 기본 데미지 적용
                    if (target.stats) {
                        target.stats.currentHp -= this.attackDamage;
                        if (target.stats.currentHp <= 0) {
                            target.stats.currentHp = 0;
                            target.isDead = true;
                        }
                    }
                }
                
                return true;
            }
        }

        // VictoryConditionManager 클래스
        class VictoryConditionManager {
            constructor() {
                this.playerNexus = null;
                this.aiNexus = null;
                this.gameEnded = false;
                this.gameEndCallback = null;
            }
            
            setNexusTowers(playerNexus, aiNexus) {

                if (this.playerNexus && this.playerNexus.isDestroyed()) {
                    return 'ai';
                }
                
                return null;
            }
            
            triggerGameEnd(winner) {
                if (this.gameEnded) return;
                
                this.gameEnded = true;
                
                if (this.gameEndCallback) {
                    this.gameEndCallback(winner);
                }
            }
            
            isGameEnded() {

            reset() {
