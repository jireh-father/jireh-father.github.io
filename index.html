<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 리그오브레전드</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #game-container {
            border: 2px solid #333;
            background: #111;
        }
        #test-results {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }
        .test-pass { color: #0f0; }
        .test-fail { color: #f00; }
    </style>
</head>
<body>
    <div id="test-results">
        <h3>TASK-014 테스트 결과</h3>
        <div id="test-output"></div>
    </div>
    <div id="game-container"></div>

    <!-- CDN 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>

    <script>
        // 게임 데이터 관리자
        class GameDataManager {
            constructor() {
                this.data = {
                    selectedChampion: null,
                    gameResult: null,
                    gameStats: {
                        kills: 0,
                        deaths: 0,
                        assists: 0,
                        gameTime: 0
                    }
                };
            }

            setSelectedChampion(champion) {
                this.data.selectedChampion = champion;
            }

            getSelectedChampion() {
                return this.data.selectedChampion;
            }

            setGameResult(result) {
                this.data.gameResult = result;
            }

            getGameResult() {
                return this.data.gameResult;
            }

            updateStats(stats) {
                Object.assign(this.data.gameStats, stats);
            }

            getStats() {
                return this.data.gameStats;
            }

            reset() {
                this.data = {
                    selectedChampion: null,
                    gameResult: null,
                    gameStats: {
                        kills: 0,
                        deaths: 0,
                        assists: 0,
                        gameTime: 0
                    }
                };
            }
        }

        // 챔피언 데이터
        class ChampionData {
            static getChampions() {
                return [
                    {

                        name: '아리',
                        title: '구미호',
                        description: '매혹적인 구미호로, 적을 유혹하여 강력한 마법 공격을 가합니다.',
                        skills: [
                            { key: 'Q', name: '현혹의 구슬', description: '마법 구슬을 날려 적에게 피해를 입힙니다.' },
                            { key: 'W', name: '여우불', description: '여우불을 소환하여 주변 적을 추적합니다.' },
                            { key: 'E', name: '매혹', description: '적을 매혹시켜 움직이지 못하게 합니다.' }
                        ],
                        stats: { hp: 100, mp: 300, attack: 80, defense: 60 }
                    },
                    {
                        id: 'garen',
                        name: '가렌',
                        title: '데마시아의 힘',
                        description: '데마시아의 용감한 전사로, 강력한 검술과 방어력을 자랑합니다.',
                        skills: [
                            { key: 'Q', name: '결정타', description: '다음 공격이 강화되어 침묵 효과를 부여합니다.' },
                            { key: 'W', name: '용기', description: '방어력과 마법 저항력이 증가합니다.' },

                        ],
                        stats: { hp: 150, mp: 250, attack: 90, defense: 100 }
                    },
                    {
                        id: 'jinx',
                        name: '징크스',
                        title: '난폭한 말괄량이',
                        description: '폭발적인 화력을 자랑하는 원거리 딜러입니다.',
                        skills: [
                            { key: 'Q', name: '휘릭휘릭!', description: '무기를 교체하여 공격 방식을 바꿉니다.' },
                            { key: 'W', name: '맞아죽을래!', description: '전기 충격 총을 발사합니다.' },
                            { key: 'E', name: '와작와작 터뜨리기!', description: '함정을 설치하여 적을 속박합니다.' }
                        ],
                        stats: { hp: 90, mp: 280, attack: 110, defense: 50 }
                    },
                    {
                        id: 'thresh',
                        name: '쓰레쉬',
                        title: '사슬 감시자',
                        description: '강력한 지원 능력으로 아군을 보호하고 적을 제어합니다.',
                        skills: [
                            { key: 'Q', name: '사신의 선고', description: '갈고리를 던져 적을 끌어당깁니다.' },
                            { key: 'W', name: '어둠의 통로', description: '랜턴을 던져 아군을 구출합니다.' },
                            { key: 'E', name: '사슬 채찍', description: '적을 밀쳐내거나 끌어당깁니다.' }
                        ],
                        stats: { hp: 120, mp: 320, attack: 70, defense: 85 }

            static getChampionById(id) {
                return this.getChampions().find(champion => champion.id === id);
            }
        }

        // 챔피언 선택 Scene
        class ChampionSelectScene extends Phaser.Scene {
            constructor() {
                super({ key: 'ChampionSelectScene' });
                this.selectedChampion = null;
                this.championCards = [];
                this.infoPanel = null;
                this.startButton = null;
            }

            preload() {
                // 배경 이미지 생성
                this.load.image('champion-bg', 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAyNCIgaGVpZ2h0PSI3NjgiIHZpZXdCb3g9IjAgMCAxMDI0IDc2OCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjEwMjQiIGhlaWdodD0iNzY4IiBmaWxsPSIjMUU0MDU3Ii8+CjwvZz4KPC9zdmc+');
                
                // 챔피언 카드 배경 이미지 생성
                this.load.image('card-bg', 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTQwIiBoZWlnaHQ9IjE4MCIgdmlld0JveD0iMCAwIDE0MCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxNDAiIGhlaWdodD0iMTgwIiBmaWxsPSIjMmMzZTUwIiBzdHJva2U9IiM0MTU2NmIiIHN0cm9rZS13aWR0aD0iMiIvPgo8L3N2Zz4=');
                
                // 선택된 카드 배경
                this.load.image('card-selected', 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTQwIiBoZWlnaHQ9IjE4MCIgdmlld0JveD0iMCAwIDE0MCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxNDAiIGhlaWdodD0iMTgwIiBmaWxsPSIjMzQ5OGRiIiBzdHJva2U9IiMyOTgwYjkiIHN0cm9rZS13aWR0aD0iMyIvPgo8L3N2Zz4=');
            }

            create() {
                // 배경 추가
                this.add.image(512, 384, 'champion-bg');
                
                // 제목 텍스트
                this.add.text(512, 60, '챔피언 선택', {
                    fontSize: '36px',
                    fill: '#ffffff',
                    fontFamily: 'Arial',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                // 챔피언 카드들 생성
                this.createChampionCards();
                
                // 정보 패널 생성
                this.createInfoPanel();
                
                // 게임 시작 버튼 생성
                this.createStartButton();

                // Scene 초기화 완료 신호
                window.championSelectSceneReady = true;
                window.championSelectScene = this;
            }

            createChampionCards() {
                const champions = ChampionData.getChampions();
                const startX = 180;
                const startY = 250;
                const cardWidth = 140;
                const cardSpacing = 160;

                champions.forEach((champion, index) => {
                    const x = startX + index * cardSpacing;
                    const y = startY;

                    // 카드 컨테이너 생성
                    const cardContainer = this.add.container(x, y);
                    
                    // 카드 배경
                    const cardBg = this.add.image(0, 0, 'card-bg')
                        .setInteractive({ useHandCursor: true })
                        .on('pointerover', () => {
                            cardBg.setTint(0xcccccc);
                            this.updateInfoPanel(champion);
                        })
                        .on('pointerout', () => {
                            if (this.selectedChampion !== champion.id) {
                                cardBg.clearTint();
                            }
                        })
                        .on('pointerdown', () => {
                            this.selectChampion(champion);
                        });

                    // 챔피언 이름
                    const nameText = this.add.text(0, -70, champion.name, {
                        fontSize: '18px',
                        fill: '#ffffff',
                        fontFamily: 'Arial',
                        fontStyle: 'bold'
                    }).setOrigin(0.5);

                    // 챔피언 타이틀
                    const titleText = this.add.text(0, -50, champion.title, {
                        fontSize: '12px',
                        fill: '#cccccc',
                        fontFamily: 'Arial'
                    }).setOrigin(0.5);

                    // 스탯 표시
                    const statsText = this.add.text(0, 60, 
                        `HP: ${champion.stats.hp}\nMP: ${champion.stats.mp}\nATK: ${champion.stats.attack}\nDEF: ${champion.stats.defense}`, {
                        fontSize: '10px',
                        fill: '#ffffff',
                        fontFamily: 'Arial',
                        align: 'center'
                    }).setOrigin(0.5);

                    cardContainer.add([cardBg, nameText, titleText, statsText]);
                    
                    // 카드 정보 저장
                    this.championCards.push({
                        container: cardContainer,
                        background: cardBg,
                        champion: champion,
                        nameText: nameText,
                        titleText: titleText,
                        statsText: statsText
                    });
                });
            }

            createInfoPanel() {
                // 정보 패널 배경
                const panelBg = this.add.rectangle(512, 450, 600, 200, 0x34495e, 0.9);
                
                // 패널 제목
                this.infoPanelTitle = this.add.text(512, 380, '챔피언 정보', {
                    fontSize: '20px',
                    fill: '#ffffff',
                    fontFamily: 'Arial',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                // 챔피언 설명
                this.infoPanelDesc = this.add.text(512, 420, '챔피언을 선택하면 정보가 표시됩니다.', {
                    fontSize: '14px',
                    fill: '#cccccc',
                    fontFamily: 'Arial',
                    align: 'center',
                    wordWrap: { width: 550 }
                }).setOrigin(0.5);

                // 스킬 정보
                this.infoPanelSkills = this.add.text(512, 480, '', {
                    fontSize: '12px',
                    fill: '#ffffff',
                    fontFamily: 'Arial',
                    align: 'center',
                    wordWrap: { width: 550 }
                }).setOrigin(0.5);

                this.infoPanel = {
                    background: panelBg,
                    title: this.infoPanelTitle,
                    description: this.infoPanelDesc,
                    skills: this.infoPanelSkills
                };
            }

            createStartButton() {
                this.startButton = this.add.rectangle(512, 600, 200, 60, 0x27ae60)
                    .setInteractive({ useHandCursor: true })
                    .setAlpha(0.5)
                    .on('pointerover', () => {
                        if (this.selectedChampion) {
                            this.startButton.setTint(0xcccccc);
                        }
                    })
                    .on('pointerout', () => {
                        this.startButton.clearTint();
                    })
                    .on('pointerdown', () => {
                        if (this.selectedChampion) {
                            window.gameDataManager.setSelectedChampion(this.selectedChampion);
                            this.scene.start('GamePlayScene');
                        }
                    });

                this.startButtonText = this.add.text(512, 600, '게임 시작', {
                    fontSize: '20px',
                    fill: '#ffffff',
                    fontFamily: 'Arial',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
            }

            selectChampion(champion) {
                // 이전 선택 해제
                this.championCards.forEach(card => {
                    card.background.clearTint();
                    card.background.setTexture('card-bg');
                });

                // 새로운 선택
                this.selectedChampion = champion.id;
                const selectedCard = this.championCards.find(card => card.champion.id === champion.id);
                if (selectedCard) {
                    selectedCard.background.setTexture('card-selected');
                }

                // 정보 패널 업데이트
                this.updateInfoPanel(champion);

                // 시작 버튼 활성화
                this.startButton.setAlpha(1);

                // 선택 완료 신호
                window.championSelected = champion.id;
            }

            updateInfoPanel(champion) {
                if (!champion) return;

                this.infoPanel.title.setText(`${champion.name} - ${champion.title}`);
                this.infoPanel.description.setText(champion.description);
                
                const skillsText = champion.skills.map(skill => 
                    `${skill.key}: ${skill.name} - ${skill.description}`
                ).join('\n');
                this.infoPanel.skills.setText(skillsText);
            }

            getSelectedChampion() {
                return this.selectedChampion;
            }

            getChampionCards() {
                return this.championCards;
            }
        }

        // 맵 데이터 클래스
        class MapData {
            constructor() {
                const config = MapData.getMapConfig();
                this.width = config.width;
                this.height = config.height;
                this.tileSize = config.tileSize;
                this.lanes = config.lanes;
                this.structures = config.structures;
                this.bushes = config.bushes;
                this.river = config.river;
                
                // 넥서스와 타워 배열 생성
                this.nexuses = [
                    { x: 100, y: 400, team: 'blue' },
                    { x: 1100, y: 400, team: 'red' }
                ];
                
                this.towers = [
                    { x: 250, y: 400, team: 'blue' },
                    { x: 950, y: 400, team: 'red' }
                ];
            }
            
            static getMapConfig() {
                return {
                    width: 1200,
                    height: 800,
                    tileSize: 32,
                    lanes: {
                        top: { y: 200 },
                        middle: { y: 400 },
                        bottom: { y: 600 }
                    },
                    structures: {
                        blueNexus: { x: 100, y: 400, team: 'blue' },
                        redNexus: { x: 1100, y: 400, team: 'red' },
                        blueTower: { x: 250, y: 400, team: 'blue' },
                        redTower: { x: 950, y: 400, team: 'red' }
                    },
                    bushes: [
                        { x: 400, y: 300, width: 100, height: 80 },
                        { x: 700, y: 500, width: 100, height: 80 },
                        { x: 500, y: 200, width: 80, height: 100 },
                        { x: 600, y: 600, width: 80, height: 100 }
                    ],
                    river: {
                        x: 500,
                        y: 0,
                        width: 200,
                        height: 800
                    }
                };
            }

            static getBushAtPosition(x, y) {
                const bushes = this.getMapConfig().bushes;
                return bushes.find(bush => 
                    x >= bush.x && x <= bush.x + bush.width &&
                    y >= bush.y && y <= bush.y + bush.height
                );
            }

            static isInBush(x, y) {
                return this.getBushAtPosition(x, y) !== undefined;
            }
        }

        // 부쉬 시야 관리자
        class BushVisionManager {
            constructor(scene) {
                this.scene = scene;
                this.visionMasks = new Map();
                this.playerVision = { x: 0, y: 0, radius: 150 };
                this.bushes = MapData.getMapConfig().bushes;
                this.init();
            }

            init() {
                // 부쉬 마스크 생성
                this.bushes.forEach((bush, index) => {
                    const mask = this.scene.add.rectangle(
                        bush.x + bush.width / 2,
                        bush.y + bush.height / 2,
                        bush.width,
                        bush.height,
                        0x000000,
                        0.7
                    );
                    mask.setVisible(false);
                    this.visionMasks.set(index, mask);
                });
            }

            updateVision(playerX, playerY) {
                this.playerVision.x = playerX;
                this.playerVision.y = playerY;

                this.bushes.forEach((bush, index) => {
                    const mask = this.visionMasks.get(index);
                    const isPlayerInBush = MapData.isInBush(playerX, playerY);
                    const isPlayerNearBush = this.isPlayerNearBush(playerX, playerY, bush);

                    // 플레이어가 부쉬 안에 있거나 부쉬 근처에 있으면 시야 확보
                    if (isPlayerInBush || isPlayerNearBush) {
                        mask.setVisible(false);
                    } else {
                        mask.setVisible(true);
                    }
                });
            }

            isPlayerNearBush(playerX, playerY, bush) {
                const bushCenterX = bush.x + bush.width / 2;
                const bushCenterY = bush.y + bush.height / 2;
                const distance = Phaser.Math.Distance.Between(
                    playerX, playerY, bushCenterX, bushCenterY
                );
                return distance < this.playerVision.radius;
            }

            getVisibleBushes() {
                return this.bushes.filter((bush, index) => {
                    const mask = this.visionMasks.get(index);
                    return !mask.visible;
                });
            }

            destroy() {
                this.visionMasks.forEach(mask => mask.destroy());
                this.visionMasks.clear();
            }
        }

        // 챔피언 클래스
        class Champion {
            constructor(scene, x, y, championId, isPlayer = false) {
                this.scene = scene;
                this.x = x;
                this.y = y;
                this.championId = championId;
                this.isPlayer = isPlayer;
                this.isDead = false;
                
                // 챔피언 데이터 가져오기
                this.data = ChampionData.getChampionById(championId);
                
                // 스탯 초기화
                this.initializeStats();
                
                // 스프라이트 생성
                this.createSprite();
                
                // 애니메이션 생성
                this.createAnimations();
                
                // UI 생성
                this.createUI();
                
                // 스킬 매니저 생성
                this.skillManager = new SkillManager(this.scene, this.championId);
                
                // 이동 관련 변수
                this.isMoving = false;
                this.moveTween = null;
                
                // 전투 관련 변수
                this.lastAttackTime = 0;
                this.attackCooldown = 1000; // 기본 공격 쿨다운 (ms)
            }
            
            initializeStats() {
                const baseStats = this.data.stats;
                this.stats = {
                    level: 1,
                    maxHp: baseStats.hp,
                    currentHp: baseStats.hp,
                    maxMp: baseStats.mp,
                    currentMp: baseStats.mp,
                    attack: baseStats.attack,
                    defense: baseStats.defense,
                    attackSpeed: baseStats.attackSpeed || 1.0,
                    moveSpeed: baseStats.moveSpeed || 350,
                    attackRange: baseStats.attackRange || 120
                };
            }
            
            createSprite() {
                // 물리 스프라이트 생성
                this.sprite = this.scene.physics.add.sprite(this.x, this.y, 'player');
                this.sprite.setDisplaySize(48, 48);
                this.sprite.setCollideWorldBounds(true);
                
                // 챔피언별 색상 설정
                const colors = {
                    'ahri': 0xff69b4,      // 핫핑크
                    'garen': 0x4169e1,     // 로열블루
                    'jinx': 0xff1493,      // 딥핑크
                    'thresh': 0x32cd32     // 라임그린
                };
                
                this.sprite.setTint(colors[this.championId] || 0xffffff);
                
                // 물리 바디 설정
                this.sprite.setCircle(20);
                this.sprite.body.setCollideWorldBounds(true);
                
                // 참조 설정
                this.sprite.champion = this;
            }
            
            createAnimations() {
                // 애니메이션 키 생성
                const animKey = `${this.championId}_${this.isPlayer ? 'player' : 'ai'}`;
                
                // 기본 애니메이션들 생성 (실제 프레임이 없으므로 시뮬레이션)
                this.animations = {
                    idle: `${animKey}_idle`,
                    walk: `${animKey}_walk`,
                    attack: `${animKey}_attack`
                };
                
                this.currentAnimation = 'idle';
            }
            
            createUI() {
                // 체력바 생성
                this.healthBarBg = this.scene.add.rectangle(this.x, this.y - 35, 50, 6, 0x000000);
                this.healthBar = this.scene.add.rectangle(this.x, this.y - 35, 48, 4, 0x00ff00);
                
                // 마나바 생성
                this.manaBarBg = this.scene.add.rectangle(this.x, this.y - 28, 50, 4, 0x000000);
                this.manaBar = this.scene.add.rectangle(this.x, this.y - 28, 48, 2, 0x0000ff);
                
                // 이름 텍스트
                this.nameText = this.scene.add.text(this.x, this.y - 50, this.data.name, {
                    fontSize: '12px',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5);
                
                // 레벨 텍스트
                this.levelText = this.scene.add.text(this.x - 25, this.y - 25, this.stats.level.toString(), {
                    fontSize: '10px',
                    fill: '#ffff00',
                    stroke: '#000000',
                    strokeThickness: 1
                }).setOrigin(0.5);
                
                this.updateUI();
            }
            
            updateUI() {
                if (this.isDead) return;
                
                // 위치 업데이트
                const uiElements = [this.healthBarBg, this.healthBar, this.manaBarBg, this.manaBar, this.nameText, this.levelText];
                uiElements.forEach(element => {
                    if (element) {
                        element.x = this.sprite.x;
                    }
                });
                
                // Y 위치 개별 설정
                if (this.healthBarBg) this.healthBarBg.y = this.sprite.y - 35;
                if (this.healthBar) this.healthBar.y = this.sprite.y - 35;
                if (this.manaBarBg) this.manaBarBg.y = this.sprite.y - 28;
                if (this.manaBar) this.manaBar.y = this.sprite.y - 28;
                if (this.nameText) this.nameText.y = this.sprite.y - 50;
                if (this.levelText) {
                    this.levelText.x = this.sprite.x - 25;
                    this.levelText.y = this.sprite.y - 25;
                }
                
                // 체력바 업데이트
                const healthPercent = this.stats.currentHp / this.stats.maxHp;
                if (this.healthBar) {
                    this.healthBar.displayWidth = 48 * healthPercent;
                    this.healthBar.x = this.sprite.x - 24 + (24 * healthPercent);
                }
                
                // 마나바 업데이트
                const manaPercent = this.stats.currentMp / this.stats.maxMp;
                if (this.manaBar) {
                    this.manaBar.displayWidth = 48 * manaPercent;
                    this.manaBar.x = this.sprite.x - 24 + (24 * manaPercent);
                }
                
                // 레벨 텍스트 업데이트
                if (this.levelText) {
                    this.levelText.setText(this.stats.level.toString());
                }
            }
            
            moveTo(targetX, targetY) {
                if (this.isDead || this.isMoving) return;
                
                this.isMoving = true;
                this.playAnimation('walk');
                
                const distance = Phaser.Math.Distance.Between(this.sprite.x, this.sprite.y, targetX, targetY);
                const duration = (distance / this.stats.moveSpeed) * 1000;
                
                this.moveTween = this.scene.tweens.add({
                    targets: this.sprite,
                    x: targetX,
                    y: targetY,
                    duration: duration,
                    ease: 'Power2',
                    onUpdate: () => {
                        this.x = this.sprite.x;
                        this.y = this.sprite.y;
                        this.updateUI();
                    },
                    onComplete: () => {
                        this.isMoving = false;
                        this.playAnimation('idle');
                        this.moveTween = null;
                    }
                });
            }
            
            playAnimation(animationType) {
                if (this.currentAnimation === animationType) return;
                
                this.currentAnimation = animationType;
                
                // 애니메이션 시뮬레이션
                switch (animationType) {
                    case 'walk':
                        this.scene.tweens.add({
                            targets: this.sprite,
                            scaleX: { from: 1, to: 1.1 },
                            scaleY: { from: 1, to: 0.9 },
                            duration: 200,
                            yoyo: true,
                            repeat: -1
                        });
                        break;
                    case 'attack':
                        this.scene.tweens.add({
                            targets: this.sprite,
                            scaleX: 1.3,
                            scaleY: 1.3,
                            duration: 150,
                            yoyo: true,
                            onComplete: () => {
                                this.playAnimation('idle');
                            }
                        });
                        break;
                    case 'idle':
                        this.scene.tweens.killTweensOf(this.sprite);
                        this.sprite.setScale(1);
                        break;
                }
            }
            
            // 기본 공격 메서드
            performBasicAttack(target) {
                if (this.isDead || target.isDead) return false;
                
                const currentTime = this.scene.time.now;
                if (currentTime - this.lastAttackTime < this.attackCooldown) {
                    return false; // 쿨다운 중
                }
                
                // 사거리 확인
                const distance = Phaser.Math.Distance.Between(this.sprite.x, this.sprite.y, target.sprite.x, target.sprite.y);
                if (distance > this.stats.attackRange) {
                    return false; // 사거리 밖
                }
                
                this.lastAttackTime = currentTime;
                this.playAnimation('attack');
                
                // 전투 시스템을 통한 공격 처리
                if (this.scene.combatSystem) {
                    this.scene.combatSystem.performBasicAttack(this, target);
                }
                
                return true;
            }
            
            // 데미지 받기 메서드
            takeDamage(damage) {
                if (this.isDead) return false;
                
                this.stats.currentHp -= damage;
                if (this.stats.currentHp <= 0) {
                    this.stats.currentHp = 0;
                    this.die();
                    return true; // 사망
                }
                
                this.updateUI();
                return false; // 생존
            }
            
            // 사망 처리 메서드
            die() {
                this.isDead = true;
                this.sprite.setTint(0x666666);
                this.sprite.setAlpha(0.5);
                
                // UI 숨기기
                [this.healthBarBg, this.healthBar, this.manaBarBg, this.manaBar, this.nameText, this.levelText].forEach(element => {
                    if (element) element.setVisible(false);
                });
                
                console.log(`${this.data.name}이 사망했습니다.`);
            }
            
            // 레벨업 메서드
            levelUp() {
                if (this.stats.level >= 18) return;
                
                this.stats.level++;
                
                // 스탯 증가
                const growthRate = 0.1;
                this.stats.maxHp += Math.floor(this.data.stats.hp * growthRate);
                this.stats.maxMp += Math.floor(this.data.stats.mp * growthRate);
                this.stats.attack += Math.floor(this.data.stats.attack * growthRate);
                this.stats.defense += Math.floor(this.data.stats.defense * growthRate);
                
                // 체력/마나 회복
                this.stats.currentHp = this.stats.maxHp;
                this.stats.currentMp = this.stats.maxMp;
                
                this.updateUI();
                console.log(`${this.data.name}이 레벨 ${this.stats.level}로 레벨업했습니다!`);
            }
            
            // 마나 사용 메서드
            useMana(amount) {
                if (this.stats.currentMp >= amount) {
                    this.stats.currentMp -= amount;
                    this.updateUI();
                    return true;
                }
                return false;
            }
            
            update() {
                if (this.isDead) return;
                
                // 위치 동기화
                this.x = this.sprite.x;
                this.y = this.sprite.y;
                
                // UI 업데이트
                this.updateUI();
                
                // 마나 자동 회복 (초당 8씩)
                if (this.stats.currentMp < this.stats.maxMp) {
                    this.stats.currentMp += 8 * (1/60); // 60FPS 기준
                    if (this.stats.currentMp > this.stats.maxMp) {
                        this.stats.currentMp = this.stats.maxMp;
                    }
                }
            }
            
            destroy() {
                // 트윈 정리
                if (this.moveTween) {
                    this.moveTween.stop();
                }
                
                // 스프라이트 제거
                if (this.sprite) {
                    this.sprite.destroy();
                }
                
                // UI 요소 제거
                [this.healthBarBg, this.healthBar, this.manaBarBg, this.manaBar, this.nameText, this.levelText].forEach(element => {
                    if (element) element.destroy();
                });
            }
        }

        // 스킬 클래스
        class Skill {
            constructor(scene, skillData) {
                this.scene = scene;
                this.key = skillData.key;
                this.name = skillData.name;
                this.description = skillData.description;
                this.manaCost = skillData.manaCost;
                this.cooldown = skillData.cooldown;
                this.damage = skillData.damage;
                this.range = skillData.range;
                this.type = skillData.type;
                
                // 쿨다운 관리
                this.lastUsedTime = 0;
                this.isActive = false;
            }
            
            canUse(champion) {
                // 쿨다운 확인
                if (this.isOnCooldown()) {
                    return false;
                }
                
                // 마나 확인
                if (champion.stats.currentMp < this.manaCost) {
                    return false;
                }
                
                // 챔피언 상태 확인
                if (champion.isDead) {
                    return false;
                }
                
                return true;
            }
            
            use(champion, targetX, targetY) {
                if (!this.canUse(champion)) {
                    return false;
                }
                
                // 마나 소모
                champion.useMana(this.manaCost);
                
                // 쿨다운 시작
                this.startCooldown();
                
                // 스킬 효과 실행
                this.executeSkillEffect(champion, targetX, targetY);
                
                return true;
            }
            
            executeSkillEffect(champion, targetX, targetY) {
                // 기본 스킬 효과 (오버라이드 가능)
                console.log(`${champion.data.name}이(가) ${this.name} 스킬을 사용했습니다!`);
                
                // 간단한 시각 효과
                this.createBasicEffect(champion.sprite.x, champion.sprite.y, targetX, targetY);
            }
            
            createBasicEffect(startX, startY, targetX, targetY) {
                // 기본 파티클 효과 생성
                if (this.scene.add && this.scene.add.particles) {
                    const particles = this.scene.add.particles(startX, startY, 'player', {
                        scale: { start: 0.3, end: 0 },
                        speed: { min: 50, max: 100 },
                        lifespan: 300,
                        quantity: 5,
                        tint: this.getSkillColor()
                    });
                    
                    // 파티클 자동 제거
                    this.scene.time.delayedCall(500, () => {
                        if (particles) particles.destroy();
                    });
                }
            }
            
            getSkillColor() {
                const colors = {
                    'Q': 0xff6b6b,
                    'W': 0x4ecdc4,
                    'E': 0x45b7d1
                };
                return colors[this.key] || 0xffffff;
            }
            
            startCooldown() {
                this.lastUsedTime = this.scene.time.now;
            }
            
            isOnCooldown() {
                // 한 번도 사용하지 않았다면 쿨다운이 아님
                if (this.lastUsedTime === 0) {
                    return false;
                }
                const elapsed = this.scene.time.now - this.lastUsedTime;
                return elapsed < this.cooldown;
            }
            
            getRemainingCooldown() {
                // 한 번도 사용하지 않았다면 남은 쿨다운은 0
                if (this.lastUsedTime === 0) {
                    return 0;
                }
                const elapsed = this.scene.time.now - this.lastUsedTime;
                const remaining = this.cooldown - elapsed;
                return Math.max(0, remaining);
            }
        }

        // 스킬 이펙트 매니저 클래스
        class SkillEffectManager {
            constructor(scene) {
                this.scene = scene;
                this.activeEffects = [];
            }
            
            createProjectile(startX, startY, targetX, targetY, options = {}) {
                const {
                    speed = 300,
                    damage = 50,
                    color = 0xffffff,
                    size = 8,
                    onHit = null
                } = options;
                
                // 투사체 스프라이트 생성 (간단한 사각형으로 대체)
                const projectile = this.scene.add.rectangle(startX, startY, size, size, color);
                projectile.setAlpha(0.8);
                
                // 방향 계산
                const angle = Phaser.Math.Angle.Between(startX, startY, targetX, targetY);
                const distance = Phaser.Math.Distance.Between(startX, startY, targetX, targetY);
                const duration = (distance / speed) * 1000;
                
                // 투사체 이동 트윈
                const tween = this.scene.tweens.add({
                    targets: projectile,
                    x: targetX,
                    y: targetY,
                    duration: duration,
                    ease: 'Linear',
                    onComplete: () => {
                        if (onHit) {
                            onHit(damage);
                        }
                        projectile.destroy();
                        this.activeEffects = this.activeEffects.filter(effect => effect !== projectile);
                    }
                });
                
                this.activeEffects.push(projectile);
                return projectile;
            }
            
            createAreaEffect(x, y, options = {}) {
                const {
                    radius = 100,
                    damage = 80,
                    duration = 2000,
                    color = 0xff0000,
                    onHit = null
                } = options;
                
                // 범위 효과 원형 스프라이트 생성 (원형으로 대체)
                const areaEffect = this.scene.add.circle(x, y, radius, color);
                areaEffect.setAlpha(0.3);
                
                // 페이드 인 효과
                this.scene.tweens.add({
                    targets: areaEffect,
                    alpha: 0.7,
                    scaleX: 1.2,
                    scaleY: 1.2,
                    duration: 200,
                    yoyo: true,
                    repeat: Math.floor(duration / 400) - 1,
                    onComplete: () => {
                        areaEffect.destroy();
                        this.activeEffects = this.activeEffects.filter(effect => effect !== areaEffect);
                    }
                });
                
                // 데미지 적용 (실제 게임에서는 충돌 감지 필요)
                if (onHit) {
                    setTimeout(() => {
                        onHit(damage);
                    }, 300);
                }
                
                this.activeEffects.push(areaEffect);
                return areaEffect;
            }
            
            createParticleEffect(x, y, options = {}) {
                const {
                    particleCount = 15,
                    duration = 1000,
                    color = 0xffffff,
                    spread = 50
                } = options;
                
                // 파티클 효과 시뮬레이션 (실제로는 Phaser의 파티클 시스템 사용)
                const particles = [];
                for (let i = 0; i < particleCount; i++) {
                    const particle = this.scene.add.rectangle(x, y, 4, 4, color);
                    particle.setAlpha(0.8);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * spread;
                    const targetX = x + Math.cos(angle) * distance;
                    const targetY = y + Math.sin(angle) * distance;
                    
                    this.scene.tweens.add({
                        targets: particle,
                        x: targetX,
                        y: targetY,
                        alpha: 0,
                        duration: duration,
                        ease: 'Power2',
                        onComplete: () => {
                            particle.destroy();
                        }
                    });
                    
                    particles.push(particle);
                }
                
                this.activeEffects.push(...particles);
                return particles;
            }
            
            createBuffEffect(target, options = {}) {
                const {
                    color = 0x00ff00,
                    duration = 3000,
                    pulseSpeed = 500
                } = options;
                
                // 버프 글로우 효과
                const originalTint = target.tint;
                
                const tween = this.scene.tweens.add({
                    targets: target,
                    scaleX: target.scaleX * 1.1,
                    scaleY: target.scaleY * 1.1,
                    duration: pulseSpeed,
                    yoyo: true,
                    repeat: Math.floor(duration / (pulseSpeed * 2)) - 1,
                    onComplete: () => {
                        target.setTint(originalTint);
                        this.activeEffects = this.activeEffects.filter(effect => effect !== tween);
                    }
                });
                
                target.setTint(color);
                this.activeEffects.push(tween);
                return tween;
            }
            
            clearAllEffects() {
                this.activeEffects.forEach(effect => {
                    if (effect.destroy) {
                        effect.destroy();
                    } else if (effect.stop) {
                        effect.stop();
                    }
                });
                this.activeEffects = [];
            }
        }

        // 게임 플레이 Scene
        class GamePlayScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GamePlayScene' });
                this.playerChampion = null;
                this.aiChampion = null;
                this.mapData = null;
                this.bushVisionManager = null;
                this.skillEffectManager = null;
                this.combatSystem = null;
                this.killDeathManager = null;
                this.gameUI = null;
                this.playerNexus = null;
                this.aiNexus = null;
                this.victoryConditionManager = null;
            }
            
            preload() {
                // 플레이어 스프라이트 생성 (간단한 원형)
                this.add.graphics()
                    .fillStyle(0xffffff)
                    .fillCircle(16, 16, 16)
                    .generateTexture('player', 32, 32);
            }
            
            create() {
                // 사운드 매니저 초기화
                this.soundManager = new SoundManager();
                this.soundManager.init();
                
                // 배경음악 재생
                this.soundManager.playBackgroundMusic();

                // 전투 시스템 초기화
                this.combatSystem = new CombatSystem(this);
                this.killDeathManager = new KillDeathManager();
                
                // 승리 조건 시스템 초기화
                this.victoryConditionManager = new VictoryConditionManager();
                this.victoryConditionManager.setGameEndCallback((winner) => {
                    this.handleGameEnd(winner);
                });
                
                // 맵 데이터 생성
                this.mapData = new MapData();
                
                // 넥서스 타워 생성
                this.createNexusTowers();
                
                // 부쉬 시야 관리자 생성
                this.bushVisionManager = new BushVisionManager(this);
                
                // 스킬 이펙트 매니저 생성
                this.skillEffectManager = new SkillEffectManager(this);
                
                // 맵 렌더링
                this.renderMap();
                
                // 챔피언 생성
                this.createChampions();
                
                // 게임 UI 생성
                this.createGameUI();
                
                // 카메라 설정
                this.setupCamera();
                
                // 입력 처리 설정
                this.setupInputHandling();
                
                // 전역 참조 설정
                window.gamePlayScene = this;
                window.gamePlaySceneReady = true;
                
                console.log('GamePlayScene이 생성되었습니다.');
            }
            
            renderMap() {
                // 배경 생성
                this.add.rectangle(
                    this.mapData.width / 2, 
                    this.mapData.height / 2, 
                    this.mapData.width, 
                    this.mapData.height, 
                    0x1a4a1a
                );
                
                // 강 렌더링 (객체로 처리)
                this.add.rectangle(
                    this.mapData.river.x + this.mapData.river.width / 2,
                    this.mapData.river.y + this.mapData.river.height / 2,
                    this.mapData.river.width,
                    this.mapData.river.height,
                    0x4169e1
                );
                
                // 부쉬 렌더링
                this.mapData.bushes.forEach(bush => {
                    this.add.rectangle(
                        bush.x + bush.width / 2,
                        bush.y + bush.height / 2,
                        bush.width,
                        bush.height,
                        0x228b22
                    );
                });
                
                // 넥서스 렌더링
                this.mapData.nexuses.forEach(nexus => {
                    const color = nexus.team === 'blue' ? 0x0066cc : 0xcc0000;
                    this.add.rectangle(nexus.x, nexus.y, 60, 60, color);
                    this.add.text(nexus.x, nexus.y, nexus.team.toUpperCase(), {
                        fontSize: '12px',
                        fill: '#ffffff'
                    }).setOrigin(0.5);
                });
                
                // 타워 렌더링
                this.mapData.towers.forEach(tower => {
                    const color = tower.team === 'blue' ? 0x4169e1 : 0xdc143c;
                    this.add.rectangle(tower.x, tower.y, 40, 40, color);
                    this.add.text(tower.x, tower.y, 'T', {
                        fontSize: '16px',
                        fill: '#ffffff',
                        fontStyle: 'bold'
                    }).setOrigin(0.5);
                });
            }
            
            createNexusTowers() {
                // 플레이어 넥서스 (왼쪽)
                this.playerNexus = new NexusTower(100, 400, 'player', this);
                
                // AI 넥서스 (오른쪽)
                this.aiNexus = new NexusTower(1100, 400, 'ai', this);
                
                // 승리 조건 매니저에 넥서스 등록
                this.victoryConditionManager.setNexusTowers(this.playerNexus, this.aiNexus);
                
                console.log('넥서스 타워가 생성되었습니다.');
            }
            
            createChampions() {
                // 선택된 챔피언 ID 가져오기
                const selectedChampionId = window.gameDataManager.getSelectedChampion();
                
                // 플레이어 챔피언 생성
                this.playerChampion = new Champion(this, 200, 400, selectedChampionId, true);
                this.playerChampion.team = 'player';
                
                // AI 챔피언 생성 (랜덤 선택)
                const aiChampions = ['ahri', 'garen', 'jinx', 'thresh'];
                const aiChampionId = aiChampions[Math.floor(Math.random() * aiChampions.length)];
                this.aiChampion = new Champion(this, 800, 400, aiChampionId, false);
                this.aiChampion.team = 'ai';
                
                console.log(`플레이어: ${selectedChampionId}, AI: ${aiChampionId}`);
            }
            
            createGameUI() {
                // 게임 UI 생성
                this.gameUI = {
                    // 플레이어 정보 패널 (화면 고정)
                    playerPanel: this.add.container(10, 10),
                    
                    // 스킬 쿨다운 표시
                    skillCooldowns: {
                        Q: this.add.text(10, 100, 'Q: Ready', { fontSize: '14px', fill: '#ffffff' }),
                        W: this.add.text(10, 120, 'W: Ready', { fontSize: '14px', fill: '#ffffff' }),
                        E: this.add.text(10, 140, 'E: Ready', { fontSize: '14px', fill: '#ffffff' })
                    },
                    
                    // 킬/데스 정보
                    kdaText: this.add.text(10, 170, 'K/D/A: 0/0/0', { fontSize: '14px', fill: '#ffffff' })
                };
                
                // 플레이어 정보 패널 구성
                const playerInfo = this.add.container(0, 0);
                
                // 플레이어 체력바
                const playerHealthBg = this.add.rectangle(0, 0, 200, 20, 0x000000);
                const playerHealthBar = this.add.rectangle(-50, 0, 180, 16, 0x00ff00);
                playerHealthBar.setOrigin(0, 0.5);
                
                // 플레이어 마나바
                const playerManaBg = this.add.rectangle(0, 25, 200, 15, 0x000000);
                const playerManaBar = this.add.rectangle(-50, 25, 180, 11, 0x0000ff);
                playerManaBar.setOrigin(0, 0.5);
                
                // 플레이어 이름 및 레벨
                const playerNameText = this.add.text(0, -15, this.playerChampion.data.name, {
                    fontSize: '16px',
                    fill: '#ffffff'
                }).setOrigin(0.5);
                
                const playerLevelText = this.add.text(-90, 0, `Lv.${this.playerChampion.stats.level}`, {
                    fontSize: '14px',
                    fill: '#ffff00'
                }).setOrigin(0.5);
                
                playerInfo.add([playerHealthBg, playerHealthBar, playerManaBg, playerManaBar, playerNameText, playerLevelText]);
                this.gameUI.playerPanel.add(playerInfo);
                
                // UI 참조 저장
                this.gameUI.playerHealthBar = playerHealthBar;
                this.gameUI.playerManaBar = playerManaBar;
                this.gameUI.playerLevelText = playerLevelText;
                
                // UI 고정 설정
                this.gameUI.playerPanel.setScrollFactor(0);
                Object.values(this.gameUI.skillCooldowns).forEach(text => text.setScrollFactor(0));
                this.gameUI.kdaText.setScrollFactor(0);
            }
            
            setupCamera() {
                // 카메라가 플레이어를 따라다니도록 설정
                this.cameras.main.startFollow(this.playerChampion.sprite);
                this.cameras.main.setBounds(0, 0, this.mapData.width, this.mapData.height);
                this.cameras.main.setZoom(1);
            }
            
            setupInputHandling() {
                // 마우스 클릭 이벤트
                this.input.on('pointerdown', (pointer) => {
                    if (pointer.rightButtonDown()) {
                        // 우클릭: 이동
                        const worldX = pointer.worldX;
                        const worldY = pointer.worldY;
                        this.playerChampion.moveTo(worldX, worldY);
                    } else if (pointer.leftButtonDown()) {
                        // 좌클릭: 기본 공격 또는 이동
                        const worldX = pointer.worldX;
                        const worldY = pointer.worldY;
                        
                        // AI 챔피언과의 거리 확인
                        const distance = Phaser.Math.Distance.Between(
                            this.playerChampion.sprite.x, 
                            this.playerChampion.sprite.y, 
                            this.aiChampion.sprite.x, 
                            this.aiChampion.sprite.y
                        );
                        
                        // 클릭 위치가 AI 챔피언 근처인지 확인
                        const clickDistance = Phaser.Math.Distance.Between(
                            worldX, worldY, 
                            this.aiChampion.sprite.x, 
                            this.aiChampion.sprite.y
                        );
                        
                        if (clickDistance < 50 && distance <= this.playerChampion.stats.attackRange) {
                            // 기본 공격
                            this.playerChampion.performBasicAttack(this.aiChampion);
                        } else {
                            // 이동
                            this.playerChampion.moveTo(worldX, worldY);
                        }
                    }
                });
                
                // 키보드 입력 설정
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys('W,S,A,D');
                this.skillKeys = this.input.keyboard.addKeys('Q,W,E,R');
                
                // 스킬 키 이벤트
                this.input.keyboard.on('keydown-Q', () => {
                    this.useSkill('Q');
                });
                
                this.input.keyboard.on('keydown-W', () => {
                    this.useSkill('W');
                });
                
                this.input.keyboard.on('keydown-E', () => {
                    this.useSkill('E');
                });
                
                // 기본 공격 키 (스페이스바)
                this.input.keyboard.on('keydown-SPACE', () => {
                    const distance = Phaser.Math.Distance.Between(
                        this.playerChampion.sprite.x, 
                        this.playerChampion.sprite.y, 
                        this.aiChampion.sprite.x, 
                        this.aiChampion.sprite.y
                    );
                    
                    if (distance <= this.playerChampion.stats.attackRange) {
                        this.playerChampion.performBasicAttack(this.aiChampion);
                    }
                });
            }
            
            useSkill(skillKey) {
                if (this.playerChampion.isDead) return;
                
                const canUse = this.playerChampion.skillManager.canUseSkill(skillKey, this.playerChampion);
                if (!canUse) {
                    console.log(`${skillKey} 스킬을 사용할 수 없습니다.`);
                    return;
                }
                
                // 마우스 위치를 타겟으로 사용
                const pointer = this.input.activePointer;
                const targetX = pointer.worldX;
                const targetY = pointer.worldY;
                
                // 스킬 사용
                this.playerChampion.skillManager.useSkill(skillKey, this.playerChampion, targetX, targetY);
                
                // 스킬 효과음 재생
                if (this.soundManager) {
                    this.soundManager.playSkillSound(skillKey, this.playerChampion.championId);
                }
                
                // 스킬 데미지 적용 (간단한 구현)
                const skillData = this.playerChampion.skillManager.getSkillData(this.playerChampion.championId, skillKey);
                if (skillData) {
                    const distance = Phaser.Math.Distance.Between(
                        this.playerChampion.sprite.x, 
                        this.playerChampion.sprite.y, 
                        this.aiChampion.sprite.x, 
                        this.aiChampion.sprite.y
                    );
                    
                    if (distance <= skillData.range) {
                        const damageResult = this.combatSystem.calculateDamage(
                            this.playerChampion, 
                            this.aiChampion, 
                            'skill', 
                            skillData.damage
                        );
                        
                        const isDead = this.combatSystem.applyDamage(this.aiChampion, damageResult.damage);
                        
                        if (isDead) {
                            this.killDeathManager.recordKill('player', 'ai');
                            this.killDeathManager.recordDeath('ai', 'player');
                            console.log('AI 챔피언이 처치되었습니다!');
                        }
                    }
                }
            }
            
                        update() {
                // 게임 종료 상태 확인
                if (this.victoryConditionManager.isGameEnded()) {
                    return;
                }

                // 챔피언 업데이트
                if (this.playerChampion) {
                    this.playerChampion.update();
                }

                if (this.aiChampion) {
                    this.aiChampion.update();
                }

                // 넥서스 타워 AI 업데이트
                this.updateNexusTowers();

                // 부쉬 시야 업데이트
                if (this.bushVisionManager) {
                    this.bushVisionManager.updateVision(this.playerChampion.sprite.x, this.playerChampion.sprite.y);
                }

                // UI 업데이트
                this.updateGameUI();

                // 간단한 AI 행동
                this.updateAI();

                // 승리 조건 체크
                this.checkVictoryCondition();
            }
            
            updateGameUI() {
                if (!this.gameUI || !this.playerChampion) return;
                
                // 플레이어 체력/마나바 업데이트
                const healthPercent = this.playerChampion.stats.currentHp / this.playerChampion.stats.maxHp;
                const manaPercent = this.playerChampion.stats.currentMp / this.playerChampion.stats.maxMp;
                
                this.gameUI.playerHealthBar.scaleX = healthPercent;
                this.gameUI.playerManaBar.scaleX = manaPercent;
                this.gameUI.playerLevelText.setText(`Lv.${this.playerChampion.stats.level}`);
                
                // 스킬 쿨다운 업데이트
                const cooldowns = this.playerChampion.skillManager.getCooldowns();
                Object.keys(this.gameUI.skillCooldowns).forEach(key => {
                    const cooldown = cooldowns[key];
                    if (cooldown > 0) {
                        this.gameUI.skillCooldowns[key].setText(`${key}: ${Math.ceil(cooldown / 1000)}s`);
                        this.gameUI.skillCooldowns[key].setTint(0x888888);
                    } else {
                        this.gameUI.skillCooldowns[key].setText(`${key}: Ready`);
                        this.gameUI.skillCooldowns[key].setTint(0xffffff);
                    }
                });
                
                // KDA 업데이트
                const playerStats = this.killDeathManager.getStats('player');
                this.gameUI.kdaText.setText(`K/D/A: ${playerStats.kills}/${playerStats.deaths}/${playerStats.assists}`);
            }
            
            updateAI() {
                if (!this.aiChampion || this.aiChampion.isDead) return;
                
                // 간단한 AI: 플레이어 근처에 있으면 공격, 멀리 있으면 접근
                const distance = Phaser.Math.Distance.Between(
                    this.aiChampion.sprite.x, 
                    this.aiChampion.sprite.y, 
                    this.playerChampion.sprite.x, 
                    this.playerChampion.sprite.y
                );
                
                if (distance <= this.aiChampion.stats.attackRange) {
                    // 공격 범위 내: 기본 공격
                    this.aiChampion.performBasicAttack(this.playerChampion);
                } else if (distance > 200 && !this.aiChampion.isMoving) {
                    // 너무 멀리 있으면 접근
                    const angle = Phaser.Math.Angle.Between(
                        this.aiChampion.sprite.x, 
                        this.aiChampion.sprite.y, 
                        this.playerChampion.sprite.x, 
                        this.playerChampion.sprite.y
                    );
                    
                    const targetX = this.playerChampion.sprite.x - Math.cos(angle) * 150;
                    const targetY = this.playerChampion.sprite.y - Math.sin(angle) * 150;
                    
                    this.aiChampion.moveTo(targetX, targetY);
                }
                
                // 랜덤 스킬 사용 (10% 확률)
                if (Math.random() < 0.001 && distance <= 200) {
                    const skills = ['Q', 'W', 'E'];
                    const randomSkill = skills[Math.floor(Math.random() * skills.length)];
                    
                    if (this.aiChampion.skillManager.canUseSkill(randomSkill, this.aiChampion)) {
                        this.aiChampion.skillManager.useSkill(
                            randomSkill, 
                            this.aiChampion, 
                            this.playerChampion.sprite.x, 
                            this.playerChampion.sprite.y
                        );
                        
                        // 스킬 데미지 적용
                        const skillData = this.aiChampion.skillManager.getSkillData(this.aiChampion.championId, randomSkill);
                        if (skillData && distance <= skillData.range) {
                            const damageResult = this.combatSystem.calculateDamage(
                                this.aiChampion, 
                                this.playerChampion, 
                                'skill', 
                                skillData.damage
                            );
                            
                            const isDead = this.combatSystem.applyDamage(this.playerChampion, damageResult.damage);
                            
                            if (isDead) {
                                this.killDeathManager.recordKill('ai', 'player');
                                this.killDeathManager.recordDeath('player', 'ai');
                                console.log('플레이어가 처치되었습니다!');
                            }
                        }
                    }
                }
            }
            
            updateNexusTowers() {
                // 플레이어 넥서스 AI (AI 챔피언 공격)
                if (this.playerNexus && !this.playerNexus.isDestroyed()) {
                    const nearestEnemy = this.playerNexus.findNearestEnemy([this.aiChampion]);
                    if (nearestEnemy && this.playerNexus.canAttack()) {
                        this.playerNexus.attack(nearestEnemy);
                    }
                }

                // AI 넥서스 AI (플레이어 챔피언 공격)
                if (this.aiNexus && !this.aiNexus.isDestroyed()) {
                    const nearestEnemy = this.aiNexus.findNearestEnemy([this.playerChampion]);
                    if (nearestEnemy && this.aiNexus.canAttack()) {
                        this.aiNexus.attack(nearestEnemy);
                    }
                }
            }

            checkVictoryCondition() {
                const winner = this.victoryConditionManager.checkVictoryCondition();
                if (winner) {
                    this.victoryConditionManager.triggerGameEnd(winner);
                }
            }

            handleGameEnd(winner) {
                console.log(`게임 종료! 승자: ${winner}`);
                
                // 게임 통계 업데이트
                const playerStats = this.killDeathManager.getStats('player');
                const gameTime = Math.floor(this.time.now / 1000);
                
                window.gameDataManager.setGameResult(winner === 'player' ? '승리' : '패배');
                window.gameDataManager.updateStats({
                    kills: playerStats.kills,
                    deaths: playerStats.deaths,
                    assists: playerStats.assists,
                    gameTime: gameTime
                });

                // 잠시 후 결과 화면으로 전환
                this.time.delayedCall(2000, () => {
                    this.scene.start('GameResultScene');
                });

                // 승리/패배 메시지 표시
                const resultText = winner === 'player' ? 'VICTORY!' : 'DEFEAT!';
                const resultColor = winner === 'player' ? '#27ae60' : '#e74c3c';
                
                this.add.text(600, 300, resultText, {
                    fontSize: '48px',
                    fill: resultColor,
                    fontFamily: 'Arial',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setScrollFactor(0);
            }
            
            // 공용 메서드들
            getPlayerChampion() {
                return this.playerChampion;
            }
            
            getAIChampion() {
                return this.aiChampion;
            }
            
            getCombatSystem() {
                return this.combatSystem;
            }
            
            getKillDeathManager() {
                return this.killDeathManager;
            }

            getPlayerNexus() {
                return this.playerNexus;
            }

            getAINexus() {
                return this.aiNexus;
            }

            getVictoryConditionManager() {
                return this.victoryConditionManager;
            }
        }
